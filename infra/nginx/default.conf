map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Pass through forwarded headers from upstream proxies (e.g. ngrok);
# fall back to local values when accessed directly.
map $http_x_forwarded_proto $x_fwd_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

map $http_x_forwarded_host $x_fwd_host {
    default $http_x_forwarded_host;
    ''      $host;
}

# When a proxy sets X-Forwarded-Proto but not X-Forwarded-Port,
# derive port from protocol so Keycloak doesn't append :8080 to URLs.
map $http_x_forwarded_proto $default_fwd_port {
    https   443;
    http    80;
    default $server_port;
}

map $http_x_forwarded_port $x_fwd_port {
    default $http_x_forwarded_port;
    ''      $default_fwd_port;
}

server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11 valid=30s ipv6=off;

    set $api_upstream http://api:8081;
    set $keycloak_upstream http://keycloak:8080;
    set $portal_web_upstream http://portal-web:80;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $x_fwd_proto;
    proxy_set_header X-Forwarded-Host $x_fwd_host;
    proxy_set_header X-Forwarded-Port $x_fwd_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    location /api/ {
        proxy_pass $api_upstream;
    }

    location /hubs/ {
        proxy_pass $api_upstream;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /auth/ {
        proxy_pass $keycloak_upstream;
    }

    location / {
        proxy_pass $portal_web_upstream;
    }
}
