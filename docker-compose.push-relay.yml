# Standalone compose file for the PushRelay service.
# Deployed separately from the main Open-KSeF stack -- typically on a
# different server behind Cloudflare (e.g. push.open-ksef.pl).
#
# Usage (dev, build from source):
#   docker compose -f docker-compose.push-relay.yml up -d --build
#
# Usage (prod, pull from GHCR):
#   Set PUSH_RELAY_IMAGE=ghcr.io/open-ksef/openksef-push-relay:latest in .env
#   docker compose -f docker-compose.push-relay.yml up -d

services:
  push-relay:
    image: ${PUSH_RELAY_IMAGE:-openksef-push-relay:dev-local}
    container_name: openksef-push-relay
    build:
      context: ./src/OpenKSeF.PushRelay
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      Relay__ApiKey: ${PUSH_RELAY_API_KEY:-}
      Relay__AdminKey: ${PUSH_RELAY_ADMIN_KEY:-}
      Relay__DataDir: /app/data
      Firebase__CredentialsJson: ${FIREBASE_CREDENTIALS_JSON:-}
      APNs__BundleId: ${APNS_BUNDLE_ID:-com.openksef.mobile}
      APNs__BaseUrl: ${APNS_BASE_URL:-https://api.push.apple.com}
      APNs__KeyId: ${APNS_KEY_ID:-}
      APNs__TeamId: ${APNS_TEAM_ID:-}
      APNs__AuthKeyP8: ${APNS_AUTH_KEY_P8:-}
    ports:
      - "${PUSH_RELAY_HOST_PORT:-8084}:8080"
    volumes:
      - push-relay-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  push-relay-data:
